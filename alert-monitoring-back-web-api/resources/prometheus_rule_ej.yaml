apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app: prometheus-operator
    release: prometheus
  name: activo2.rules
  namespace: prometheus
spec:
  groups:

# Alertado endpoints CMS
  - name: activo2-servicios.rules
    rules:
    - alert: Activo2ServiceGenericProbeFailed
      annotations:
        message: "[CMS] Servicios principales Usuarios/Multimedia/Ejemplos/Notificaciones/Contenidos"
      expr: probe_success{job=~"blackbox-activo-2-simple.*"} != 1
      for: 5m
      labels:
          severity: warning
          solucion: activo2
          namespace: activo2-cms
          canal: msteams
          service: principal
          msteams: "true"
    
    - alert: Activo2ServiceCriticalProbeFailed
      annotations:
        message: "[CMS] Servicios criticos Multimedia/ Ejemplos/Contenidos"
      expr: probe_success{job=~"blackbox-activo-2-principal.*"} != 1
      for: 2m
      labels:
          severity: critical
          solucion: activo2
          namespace: activo2-cms
          canal: omi
          service: principal
          omi: "true"
    
    - alert: Activo2LoginServiceProbeFailed
      annotations:
        message: "[CMS] Servicio critico Login de Usuario"
      expr: probe_success{job=~"blackbox-activo-2-login.*"} != 1
      for: 2m
      labels:
          severity: critical
          solucion: activo2
          namespace: activo2-cms
          canal: omi
          service: login
          omi: "true"
    
    - alert: Activo2CMSPublicacionesDecremento #No tiene condicion "for" para que dispare siempre, al ser de confirmacion MANUAL en OMi
      annotations:
        message: "La publicacion destacada {{ $labels.slug }} con id {{ $labels.id }} ha decrecido en el contador de visitas."
      expr: delta(activo2_cms_destacados[5m]) < 0
      labels:
          severity: critical
          type: MANUAL
          solucion: activo2
          namespace: activo2-cms
          canal: omi
          service: monitoring
          omi: "true"

