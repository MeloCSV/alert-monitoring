# ClusterRole: permisos de solo lectura sobre PrometheusRules
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: get-scheduled-alert
rules:
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - prometheusrules
    verbs:
      - get
      - list
      - watch
---
# ClusterRoleBinding: vincula la SA get-scheduled-alert (ns prometheus) al ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: get-scheduled-alert
subjects:
  - kind: ServiceAccount
    name: get-scheduled-alert
    namespace: prometheus
roleRef:
  kind: ClusterRole
  name: get-scheduled-alert
  apiGroup: rbac.authorization.k8s.io
