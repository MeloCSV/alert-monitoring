<nav class="top-tabs">
  <button type="button" class="tab" [class.active]="activeTab === 'alerts'" (click)="select('alerts')">
    Alarmado de aplicaciones
  </button>
  <button type="button" class="tab" [class.active]="activeTab === 'kibana-rules'" (click)="select('kibana-rules')">
    Alarmado de APIs
  </button>
</nav>

@if (activeTab === 'alerts') {
  <app-alert-table></app-alert-table>
} @else {
  <app-alert-table mode="apis"></app-alert-table>
}
