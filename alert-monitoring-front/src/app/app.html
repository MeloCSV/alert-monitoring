<nav class="top-tabs">

    Alarmas por aplicación
  </button>
  <button type="button" class="tab" [class.active]="activeTab === 'kibana-rules'" (click)="select('kibana-rules')">

  </button>
</nav>

} @else {
  <app-kibana-rules></app-kibana-rules>
}
